<div class="toolbar">
    <button hlmBtn variant="outline" size="sm" (click)="onBack()">
        <ng-icon hlm name="lucideArrowUp" size="sm" /> Students
    </button>
    <span class="toolbar-title">Student Detail</span>
    <span class="spacer"></span>
</div>

@if (errorMessage()) {
<p class="error">{{ errorMessage() }}</p>
}



@if (loaded()) {
<div class="detail-card">
    <div class="detail-card-header">
        <span class="detail-card-title">Student</span>
    </div>

    <div class="detail-card-body">
        <div class="field">
            <label class="field-label" for="identifier">Name</label>
            <input id="identifier" class="field-input" type="text" [(ngModel)]="identifier" />
        </div>
        <div class="field">
            <label class="field-label" for="nextIepDate">Next IEP Date</label>
            <input id="nextIepDate" class="field-input" type="date" [(ngModel)]="nextIepDate" />
        </div>

        <div class="actions">
            <button hlmBtn variant="outline" size="sm" (click)="onCancel()" [disabled]="!hasChanges()">Cancel</button>
            <button hlmBtn size="sm" (click)="onSave()" [disabled]="!hasChanges() || saving()">
                {{ saving() ? 'Saving...' : 'Save' }}
            </button>
        </div>
    </div>

    <div class="card-footer">
        <button hlmBtn variant="outline" size="sm" (click)="onGoals()">
            <ng-icon hlm name="lucideTarget" size="sm" /> Goals
        </button>
        <span class="spacer"></span>
        @if (successMessage()) {
        <span class="success-label" [class.fade-out]="fading()">{{ successMessage() }}</span>
        }
    </div>
</div>
}
