<div class="overlay" (click)="onCancel()"></div>

<div class="modal">
    <div class="modal-header">
        <h2 class="modal-title">Add Student</h2>
        <button hlmBtn variant="ghost" size="icon-sm" (click)="onCancel()" aria-label="Close">
            <ng-icon hlm name="lucideX" size="sm" />
        </button>
    </div>

    <form class="modal-body" (ngSubmit)="onSubmit()" #studentForm="ngForm">

        <div class="field">
            <label for="identifier">Student</label>
            <input hlmInput
                id="identifier"
                type="text"
                class="w-full"
                [(ngModel)]="form.identifier"
                name="identifier"
                required
                placeholder="Initials or other non-personally identifiable label"
            />
        </div>

        <!-- <div class="field">
            <label for="programYear">Program Year</label>
            <input   
                id="programYear"
                type="number"
                [(ngModel)]="form.programYear"
                name="programYear"
                placeholder="e.g. 2025"
            />
        </div>

        <div class="field">
            <label for="enrollmentDate">Enrollment Date</label>
            <input
                id="enrollmentDate"
                type="date"
                [(ngModel)]="form.enrollmentDate"
                name="enrollmentDate"
            />
        </div> -->

        <div class="field">
            <label for="nextIepDate">Next IEP Date</label>
            <input hlmInput
                id="nextIepDate"
                type="date"
                class="w-full"
                [(ngModel)]="form.nextIepDate"
                name="nextIepDate"
            />
        </div>

        @if (errorMessage()) {
            <p class="error">{{ errorMessage() }}</p>
        }

        <div class="modal-actions">
            <button hlmBtn type="button" variant="outline" size="sm" (click)="onCancel()">Cancel</button>
            <button hlmBtn type="submit" size="sm" [disabled]="studentForm.invalid || isSubmitting()">
                {{ isSubmitting() ? 'Saving...' : 'Add Student' }}
            </button>
        </div>

    </form>
</div>
