<div class="card" (click)="onCardClick()">
    <div class="card-header">
        <span class="card-title">Goal: {{ goal().category }}</span>
        @if (goal().closeDate !== null) {
            <span class="closed-badge" [class.achieved]="goal().achieved === true">
                {{ goal().achieved === true ? 'Closed ✓' : 'Closed ✗' }}
            </span>
        }
        @if (goal().targetCompletionDate) {
            <span class="event-count">Target: {{ goal().targetCompletionDate | date:'mediumDate' }}</span>
        } @else {
            <span class="event-count">No target date</span>
        }
    </div>

    <div class="card-body">
        <p class="description">{{ goal().description }}</p>
    </div>

    <div class="card-footer">
        <button hlmBtn variant="outline" size="sm" (click)="$event.stopPropagation(); onProgressEventsClick()">
            <ng-icon hlm name="lucideActivity" size="sm" /> Progress Events
        </button>
        <button hlmBtn variant="outline" size="sm" (click)="$event.stopPropagation(); onBenchmarksClick()">
            <ng-icon hlm name="lucideListChecks" size="sm" /> Benchmarks
        </button>
    </div>
</div>
