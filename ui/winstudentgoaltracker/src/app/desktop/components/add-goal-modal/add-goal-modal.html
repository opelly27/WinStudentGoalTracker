<div class="overlay" (click)="onCancel()"></div>

<div class="modal">
    <div class="modal-header">
        <h2 class="modal-title">Add Goal</h2>
        <button hlmBtn variant="ghost" size="icon-sm" (click)="onCancel()" aria-label="Close">
            <ng-icon hlm name="lucideX" size="sm" />
        </button>
    </div>

    <form class="modal-body" (ngSubmit)="onSubmit()" #goalForm="ngForm">

        <div class="field">
            <label for="category">Category<span class="required">*</span></label>
            <input hlmInput
                id="category"
                type="text"
                class="w-full"
                [(ngModel)]="form.category"
                name="category"
                required
                placeholder="e.g. Academics"
            />
        </div>

        <div class="field">
            <label for="description">Description</label>
            <textarea hlmTextarea
                id="description"
                class="w-full"
                [(ngModel)]="form.description"
                name="description"
                rows="3"
                placeholder="Describe the goal..."
            ></textarea>
        </div>

        <div class="field">
            <label for="baseline">Baseline</label>
            <textarea hlmTextarea
                id="baseline"
                class="w-full"
                [(ngModel)]="form.baseline"
                name="baseline"
                rows="3"
                placeholder="Enter baseline..."
            ></textarea>
        </div>

        <div class="field">
            <label for="targetCompletionDate">Target Completion Date</label>
            <input hlmInput
                id="targetCompletionDate"
                type="date"
                class="w-full"
                [(ngModel)]="form.targetCompletionDate"
                name="targetCompletionDate"
            />
        </div>

        <!-- Parent goal dropdown hidden — may not be needed
        @if (parentGoalOptions().length > 0) {
            <div class="field">
                <label for="goalParentId">Parent Goal <span class="optional">(optional)</span></label>
                <select id="goalParentId" [(ngModel)]="form.goalParentId" name="goalParentId">
                    <option [ngValue]="null">None</option>
                    @for (goal of parentGoalOptions(); track goal.goalId) {
                        <option [ngValue]="goal.goalId">{{ goal.category }}</option>
                    }
                </select>
            </div>
        }
        -->

        @if (errorMessage()) {
            <p class="error">{{ errorMessage() }}</p>
        }

        <div class="modal-actions">
            <button hlmBtn type="button" variant="outline" size="sm" (click)="onCancel()">Cancel</button>
            <button hlmBtn type="submit" size="sm" [disabled]="goalForm.invalid || isSubmitting()">
                {{ isSubmitting() ? 'Saving...' : 'Add Goal' }}
            </button>
        </div>

    </form>
</div>
