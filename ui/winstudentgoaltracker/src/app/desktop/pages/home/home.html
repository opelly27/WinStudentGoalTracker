<div class="shell">
    <!-- Header -->
    <header class="header">
        <button hlmSidebarTrigger></button>
        <span class="header-title">{{ auth.schoolDistrictName() }} — {{ auth.programName() }}</span>
        <button class="logout-btn" (click)="onLogout()">Log Out</button>
    </header>

    <!-- Body: Sidebar + Main (Spartan sidebar shell; collapse still driven by sidebarExpanded) -->
    <div class="body" hlmSidebarWrapper>
        @if (sidebarExpanded()) {
        <div class="sidebar-backdrop" (click)="onToggleSidebar()"></div>
        }
        <div class="sidebar" [class.expanded]="sidebarExpanded()">
            <hlm-sidebar [collapsible]="'none'" class="spartan-sidebar-host">
                <div hlmSidebarContent class="spartan-sidebar-scroll">
                    <div hlmSidebarGroup>
                        <div hlmSidebarGroupContent>
                            <a class="nav-item" routerLink="/students">Home</a>
                            <app-sidebar-tree-node [nodes]="sidebarTree()" [depth]="0" />
                        </div>
                    </div>
                </div>
            </hlm-sidebar>
        </div>

        <main hlmSidebarInset class="content">
            <router-outlet />
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>&copy; 2026 WinStudentGoalTracker</span>
    </footer>
</div>
